# Replicates the Vite dev proxy (vite.config.js) for production.
# Upstream names (api / node / monitor) are the docker-compose service names.

# Needed so WebSocket (/monitor-ai-api/ws/live) upgrades are proxied correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Python FastAPI inventory API (port 8000). Keeps the /api prefix. ---
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;            # MJPEG: /api/live/stream
        proxy_read_timeout 3600s;
    }

    # --- Node backend (port 4000). /monitor-api/* is rewritten to /api/*. ---
    location /monitor-api/ {
        rewrite ^/monitor-api/(.*)$ /api/$1 break;
        proxy_pass http://node:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;            # SSE: /api/room-entries/stream
        proxy_read_timeout 3600s;
    }

    # --- Monitor-AI service (port 5001). Prefix stripped; supports WS + MJPEG. ---
    location /monitor-ai-api/ {
        rewrite ^/monitor-ai-api/(.*)$ /$1 break;
        proxy_pass http://monitor:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;         # WS: /ws/live
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;            # MJPEG: /stream
        proxy_read_timeout 3600s;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
