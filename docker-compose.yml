# Smart Inventary / WisRight AI — Coolify deployment
#
# Public (Traefik-routed via SERVICE_FQDN):
#   dashboard  -> the React UI (nginx), reverse-proxies the 3 backends internally
#   node       -> Node auth/RFID API, also hit directly by on-prem ESP32 units
# Internal only (expose, reached via the dashboard's nginx):
#   api        -> FastAPI inventory API (:8000)
#   monitor    -> Monitor-AI camera + RT-DETR (:5001)
#
# This stack uses embedded SQLite (not MySQL), so persistence is named volumes.
# SERVICE_FQDN_* / SERVICE_PASSWORD_* are Coolify magic variables (auto-generated).

services:
  # --- Node backend: auth, RFID, room entries, transfers, alerts (SQLite) ---
  node:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    # node stays internal — the dashboard's nginx proxies to it over the compose
    # network. Give it a public domain here only if on-prem ESP32 units must reach
    # it directly (add: SERVICE_FQDN_NODE_4000: 'https://your-api-domain').
    environment:
      PORT: 4000
      DB_PATH: /data/data.db
      JWT_SECRET: '${SERVICE_PASSWORD_JWT}'
      ADMIN_USERNAME: '${ADMIN_USERNAME:-admin}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:-admin123}'
      DEFAULT_EMPLOYEE_PASSWORD: '${DEFAULT_EMPLOYEE_PASSWORD:-employee123}'
      EXPIRY_ALERT_DAYS: '${EXPIRY_ALERT_DAYS:-180}'
      MONITOR_SERVICE_URL: 'http://monitor:5001'
    volumes:
      - 'node-data:/data'
    expose:
      - '4000'
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"require('http').get('http://localhost:4000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --- Python FastAPI inventory API: catalog, verification, analytics (SQLite) ---
  api:
    build:
      context: ./inventory_ai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INV_DATABASE_URL: 'sqlite:////data/inventory.db'
      INV_RTDETR_DEVICE: 'cpu'
      # Optional: point verification/live camera at an RTSP stream (else webcam 0, absent in-container)
      # INV_CAMERA_SOURCE: 'rtsp://user:pass@192.168.29.14/stream1'
    volumes:
      - 'inv-data:/data'
    expose:
      - '8000'
    # Seed the demo DB on first boot (idempotent — skips if products exist), then serve.
    command: >-
      sh -c "python -m database.seed || true;
             exec uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # --- Monitor-AI: IP-camera person detection (RT-DETR) + ByteTrack + RFID matching ---
  monitor:
    build:
      context: ./inventory_ai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONITOR_HOST: '0.0.0.0'
      MONITOR_PORT: 5001
      MONITOR_ROOM: '${MONITOR_ROOM:-Room 1}'
      MONITOR_NODE_API_URL: 'http://node:4000/api'
      MONITOR_NODE_ADMIN_USERNAME: '${ADMIN_USERNAME:-admin}'
      MONITOR_NODE_ADMIN_PASSWORD: '${ADMIN_PASSWORD:-admin123}'
      # Leave MONITOR_CAMERA_URL empty to fall back to a local webcam (not available in a container).
      MONITOR_CAMERA_URL: '${MONITOR_CAMERA_URL:-}'
      MONITOR_CAMERA_USER: '${MONITOR_CAMERA_USER:-admin}'
      MONITOR_CAMERA_PASSWORD: '${MONITOR_CAMERA_PASSWORD:-123456}'
    depends_on:
      node:
        condition: service_healthy
    expose:
      - '5001'
    command: ['python', '-m', 'backend.monitor_service.main']
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5001/health').status==200 else 1)\""
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # --- Dashboard (React build served by nginx; reverse-proxies the 3 backends) ---
  dashboard:
    build:
      context: ./inventory_ai/dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_FQDN_DASHBOARD_80: 'https://inventory.wisright.com'
    expose:
      - '80'
    depends_on:
      node:
        condition: service_healthy
      api:
        condition: service_healthy
      monitor:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  node-data: null
  inv-data: null
